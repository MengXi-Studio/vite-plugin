# npm 包构建与发布（手动触发，OIDC 可信发布 + Provenance 签名）
name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      # 勾选后仅构建，不发布到 npm
      skip_publish:
        description: 'Skip publish (build only)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '24.14.0'
  PNPM_VERSION: '10.30.0'
  NPM_REGISTRY: 'https://registry.npmjs.org'

# id-token: write — OIDC 可信发布必需，用于生成 Sigstore 签名令牌
# contents: read  — 检出代码必需（最小权限原则）
permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    # 关联 vite-plugin 环境，与 npm Granular Token 的 GitHub Actions environment 绑定
    # 在 GitHub Settings → Environments → vite-plugin 中配置 NPM_TOKEN 和审批流程
    environment: vite-plugin

    steps:
      # 检出代码（固定到触发工作流的 commit，防止发布期间默认分支被篡改）
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      # 安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      # 设置 Node.js 环境，启用 pnpm 缓存
      # registry-url 会自动创建 .npmrc 文件，将 NODE_AUTH_TOKEN 作为认证令牌
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: ${{ env.NPM_REGISTRY }}

      # 安装依赖（严格匹配 lockfile）
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 构建 @meng-xi/vite-plugin 包
      - name: Build core package
        run: pnpm run build:core

      # 验证构建产物是否存在
      - name: Verify build output
        run: |
          if [ ! -d "packages/core/dist" ]; then
            echo "::error::Build output not found: packages/core/dist"
            exit 1
          fi
          echo "✅ Build output verified"

      # 检查版本号是否与 npm 已发布版本重复
      - name: Check version
        if: ${{ !inputs.skip_publish }}
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          PUBLISHED_VERSION=$(npm view @meng-xi/vite-plugin version --registry ${{ env.NPM_REGISTRY }} 2>/dev/null || echo "none")
          echo "published_version=$PUBLISHED_VERSION" >> $GITHUB_OUTPUT

          if [ "$CURRENT_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "⚠️ Version $CURRENT_VERSION already published, skipping"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "📦 Version $CURRENT_VERSION ready to publish (published: $PUBLISHED_VERSION)"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      # 发布到 npm（OIDC 可信发布 + Provenance 签名）
      #
      # OIDC 可信发布流程：
      #   1. GitHub 生成 OIDC 令牌（需 id-token: write 权限）
      #   2. npm CLI 将 OIDC 令牌发送至 Sigstore 进行签名
      #   3. 签名后的 Provenance 声明随包一起发布到 npm
      #   4. 用户可通过 npm audit signatures 验证包的来源和构建环境
      #
      # 前置配置（npmjs.com）：
      #   - 创建 Granular Access Token，设置 GitHub Actions environment 为 vite-plugin
      #   - 在包的 Publishing access 中配置 Trusted Publisher（Repository + Workflow + Environment）
      #
      # 前置配置（GitHub）：
      #   - Settings → Environments → 新建 vite-plugin 环境
      #   - 在 vite-plugin 环境中添加 NPM_TOKEN secret
      #   - 可选：配置 Required Reviewers 增加审批环节
      - name: Publish to npm
        if: ${{ !inputs.skip_publish && steps.version.outputs.should_publish == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm --filter @meng-xi/vite-plugin publish --no-git-checks --access public --provenance

      # 发布结果摘要
      - name: Publish summary
        if: ${{ !inputs.skip_publish && steps.version.outputs.should_publish == 'true' }}
        run: |
          echo "## 📦 Published @meng-xi/vite-plugin@${{ steps.version.outputs.current_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`${{ steps.version.outputs.current_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Provenance**: ✅ Signed with Sigstore" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: \`vite-plugin\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry**: ${{ env.NPM_REGISTRY }}" >> $GITHUB_STEP_SUMMARY

      - name: Skip publish summary
        if: ${{ inputs.skip_publish || steps.version.outputs.should_publish != 'true' }}
        run: |
          echo "## ⏭️ Publish Skipped" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.skip_publish }}" = "true" ]; then
            echo "- Reason: skip_publish enabled" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Reason: version ${{ steps.version.outputs.current_version }} already published" >> $GITHUB_STEP_SUMMARY
          fi
