name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      skip_publish:
        description: 'Skip publish (build only)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '24.14.0'
  PNPM_VERSION: '10.30.0'
  NPM_REGISTRY: 'https://registry.npmjs.org'

permissions:
  id-token: write # OIDC 必需
  contents: read

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    # ⚠️ 如果 npm Trusted Publisher 没有要求 Environment，请删除下一行
    # 如果有要求，务必确保名称完全一致（包括大小写）
    environment: vite-plugin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      # 核心修改：在这里指定 registry-url，让 setup-node 自动处理 OIDC 认证
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY }} # ← 关键！
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm run build:core

      - name: Verify build output
        run: |
          if [ ! -d "packages/core/dist" ]; then
            echo "::error::Build output not found: packages/core/dist"
            exit 1
          fi

      - name: Check version
        if: ${{ !inputs.skip_publish }}
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          PUBLISHED_VERSION=$(npm view @meng-xi/vite-plugin version --registry ${{ env.NPM_REGISTRY }} 2>/dev/null || echo "none")
          echo "published_version=$PUBLISHED_VERSION" >> $GITHUB_OUTPUT

          if [ "$CURRENT_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: ${{ !inputs.skip_publish && steps.version.outputs.should_publish == 'true' }}
        run: npm publish --provenance --access public
        working-directory: packages/core

      - name: Publish summary
        if: ${{ !inputs.skip_publish && steps.version.outputs.should_publish == 'true' }}
        run: |
          echo "## 📦 Published @meng-xi/vite-plugin@${{ steps.version.outputs.current_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`${{ steps.version.outputs.current_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Auth**: OIDC Trusted Publisher (tokenless)" >> $GITHUB_STEP_SUMMARY
          echo "- **Provenance**: ✅ Signed with Sigstore" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: \`vite-plugin\`" >> $GITHUB_STEP_SUMMARY

      - name: Skip publish summary
        if: ${{ inputs.skip_publish || steps.version.outputs.should_publish != 'true' }}
        run: |
          echo "## ⏭️ Publish Skipped" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.skip_publish }}" = "true" ]; then
            echo "- Reason: skip_publish enabled" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Reason: version ${{ steps.version.outputs.current_version }} already published" >> $GITHUB_STEP_SUMMARY
          fi
