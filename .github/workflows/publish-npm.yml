# npm 包构建与发布（手动触发，OIDC 受信任发布者 + Provenance 签名）
name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      # 勾选后仅构建，不发布到 npm
      skip_publish:
        description: 'Skip publish (build only)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '24.14.0'
  PNPM_VERSION: '10.30.0'
  NPM_REGISTRY: 'https://registry.npmjs.org'

# id-token: write — OIDC 受信任发布必需
# contents: read  — 检出代码必需（最小权限原则）
permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    # 必须与 npm Trusted Publisher 中配置的 Environment 一致
    environment: vite-plugin

    steps:
      # 检出代码，固定到触发 commit 防止篡改
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      # 安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      # 设置 Node.js 环境，启用 pnpm 缓存
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      # 配置 npm registry（不设置 _authToken，让 OIDC 自动接管认证）
      - name: Configure npm registry
        run: npm config set registry ${{ env.NPM_REGISTRY }}

      # 安装依赖（严格匹配 lockfile）
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 构建 @meng-xi/vite-plugin 包
      - name: Build core package
        run: pnpm run build:core

      # 验证构建产物
      - name: Verify build output
        run: |
          if [ ! -d "packages/core/dist" ]; then
            echo "::error::Build output not found: packages/core/dist"
            exit 1
          fi

      # 检查版本号是否与 npm 已发布版本重复
      - name: Check version
        if: ${{ !inputs.skip_publish }}
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          PUBLISHED_VERSION=$(npm view @meng-xi/vite-plugin version --registry ${{ env.NPM_REGISTRY }} 2>/dev/null || echo "none")
          echo "published_version=$PUBLISHED_VERSION" >> $GITHUB_OUTPUT

          if [ "$CURRENT_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      # OIDC 受信任发布者 + Provenance 签名，免 Token
      # 前置配置：npmjs.com 包的 Settings → Publishing access → Trusted Publisher
      #   Repository owner / name / Workflow filename / Environment 需与本工作流一致
      - name: Publish to npm
        if: ${{ !inputs.skip_publish && steps.version.outputs.should_publish == 'true' }}
        run: npm publish --provenance --access public
        working-directory: packages/core

      # 发布结果摘要
      - name: Publish summary
        if: ${{ !inputs.skip_publish && steps.version.outputs.should_publish == 'true' }}
        run: |
          echo "## 📦 Published @meng-xi/vite-plugin@${{ steps.version.outputs.current_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`${{ steps.version.outputs.current_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Auth**: OIDC Trusted Publisher (tokenless)" >> $GITHUB_STEP_SUMMARY
          echo "- **Provenance**: ✅ Signed with Sigstore" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: \`vite-plugin\`" >> $GITHUB_STEP_SUMMARY

      - name: Skip publish summary
        if: ${{ inputs.skip_publish || steps.version.outputs.should_publish != 'true' }}
        run: |
          echo "## ⏭️ Publish Skipped" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.skip_publish }}" = "true" ]; then
            echo "- Reason: skip_publish enabled" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Reason: version ${{ steps.version.outputs.current_version }} already published" >> $GITHUB_STEP_SUMMARY
          fi
